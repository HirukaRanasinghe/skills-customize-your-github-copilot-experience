name: "CI — Intro Testing (pytest)"

on:
  push:
    paths:
      - 'assignments/intro-testing-pytest/**'
  pull_request:
    paths:
      - 'assignments/intro-testing-pytest/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r assignments/intro-testing-pytest/requirements.txt
      - name: Run tests
        run: |
          pytest assignments/intro-testing-pytest -q
